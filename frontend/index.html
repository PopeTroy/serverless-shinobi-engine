<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shinobi GenAI World Simulator</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://js.puter.com/v2/"></script>
    <script src="secrets.js"></script>
</head>
<body>
    <div id="app-grid">
        <aside id="creator-sidebar">
            <div class="logo">🌀 SHINOBI ENGINE</div>
            <p class="subtitle">Neural Interactive World Model Generator</p>

            <div class="input-group">
                <h3>1. Dream the Environment</h3>
                <textarea id="worldPrompt" placeholder="Describe your game world... (e.g., 'A cyberpunk alleyway in heavy rain, neon lights reflecting on wet asphalt, retro-futuristic arcade machines glowing.')"></textarea>
            </div>

            <div class="input-group">
                <h3>2. Logic & Mechanics</h3>
                <select id="gameGenre">
                    <option value="Horror">Psychological Horror Simulation</option>
                    <option value="Adventure">Open-World Exploration Journey</option>
                    <option value="Action">High-Velocity Cyber Action Matrix</option>
                    <option value="RPG">Neural Choice Role-Playing Domain</option>
                </select>
            </div>

            <button id="generate-btn" class="launch-btn" onclick="generateNeuralWorld()">Manifest Simulation</button>
            <div id="terminal-log">System: Ready to manifest latent realities...</div>
        </aside>

        <main id="main-content">
            <header id="top-navbar">
                <div class="status-indicator">
                    Active Profile: <span id="user-display" class="matrix-text">Loading Node...</span>
                </div>
                <div class="session-indicator">
                    Simulation Latent Hash: <span id="session-hash" class="matrix-text">None</span>
                </div>
            </header>

            <div id="viewport-container">
                <video id="renderingCanvas" autoplay playsinline muted></video>
                <div id="viewport-overlay">Awaiting Neural World Generation Vector...</div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
