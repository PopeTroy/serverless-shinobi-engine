name: Deploy Open-Source Shinobi Engine
on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Creates a secure module dynamically using your GitHub repository secrets
      - name: Inject Groq and NVIDIA Secrets
        run: |
          echo "const ENV_CONFIG = {
            groqKey: '${{ secrets.GROQ_API_KEY }}',
            nvidiaKey: '${{ secrets.NVIDIA_NIM_KEY }}'
          };" > ./frontend/secrets.js

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: site-distribution
          path: ./frontend/
