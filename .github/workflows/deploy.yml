name: Deploy Open-Source Shinobi Engine
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Matrix
        uses: actions/checkout@v4

      # Dynamically compiles the environmental keys into an isolated JavaScript file
      - name: Inject Groq and NVIDIA Secrets
        run: |
          echo "const ENV_CONFIG = {
            groqKey: '${{ secrets.GROQ_API_KEY }}',
            nvidiaKey: '${{ secrets.NVIDIA_NIM_KEY }}'
          };" > ./frontend/secrets.js

      - name: Upload Complete Distribution Package
        uses: actions/upload-artifact@v4
        with:
          name: shinobi-engine-build
          path: ./frontend/
